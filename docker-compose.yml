services:
  survival:
    build:
      context: .
      target: runtime
    container_name: survival-roguelike
    ports:
      - "5176:8080"
    depends_on:
      - multiplayer
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  multiplayer:
    build:
      context: .
      target: server
    container_name: survival-multiplayer
    expose:
      - "3001"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
