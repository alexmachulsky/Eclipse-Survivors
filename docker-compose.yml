services:
  survival:
    build:
      context: .
      target: runtime
    container_name: survival-roguelike
    ports:
      - "5176:8080"
    depends_on:
      - multiplayer
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  multiplayer:
    build:
      context: .
      target: server
    container_name: survival-multiplayer
    environment:
      ALLOWED_ORIGINS: "http://localhost:5176,http://127.0.0.1:5176"
      # This service is only reachable via the nginx reverse proxy (expose, not
      # ports), and nginx overwrites X-Real-IP with the genuine client address,
      # so the forwarded headers are trustworthy here. Required for per-IP
      # throttling to bucket by real client instead of the nginx container IP.
      TRUST_PROXY: "true"
    expose:
      - "3001"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
