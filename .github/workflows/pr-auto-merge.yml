name: PR CI & Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

  auto-merge:
    name: Enable Auto-merge
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              auto_merge: { merge_method: 'squash' },
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Approve and merge via CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto \
            --squash

# Code review is intentionally not in CI.
# Run Codex locally against your ChatGPT plan before pushing:
#
#   codex exec "Review my current branch against main. Read AGENTS.md
#   and CLAUDE.md for project conventions. Focus on correctness,
#   engine/React split violations, and perf hot-path rules. Skip
#   stylistic nitpicks."
#
# The Codex CLI uses your ChatGPT plan when signed in via `codex login`,
# avoiding per-token API charges. CI auto-review with plan auth is not
# currently supported (the official codex-action requires an API key).
