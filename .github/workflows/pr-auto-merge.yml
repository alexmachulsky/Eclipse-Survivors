name: PR CI & Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

  gate:
    name: Security-path gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      sensitive: ${{ steps.check.outputs.sensitive }}
    steps:
      - uses: actions/github-script@v7
        id: check
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            // Server, deployment, dependency manifest, and CI changes carry the
            // most security risk, so they must not ride the no-review auto-merge.
            const sensitive = /^(server\/|\.github\/|Dockerfile$|docker-compose\.yml$|nginx\.conf$|package(-lock)?\.json$)/;
            const hits = files.map(f => f.filename).filter(name => sensitive.test(name));
            const isSensitive = hits.length > 0;
            if (isSensitive) {
              core.notice(`Security-sensitive paths changed (${hits.join(', ')}); auto-merge disabled — manual review + merge required.`);
            }
            core.setOutput('sensitive', String(isSensitive));

  auto-merge:
    name: Enable Auto-merge
    runs-on: ubuntu-latest
    needs: [ci, gate]
    # Never auto-merge a draft PR, and never auto-merge a PR that touches
    # security-sensitive paths (server/deploy/CI/deps) — those require a human
    # to review and merge manually. A green build/test is the gate for the rest.
    if: github.event.pull_request.draft == false && needs.gate.outputs.sensitive == 'false'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              auto_merge: { merge_method: 'squash' },
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Approve and merge via CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto \
            --squash

# Code review is intentionally not in CI.
# Run Codex locally against your ChatGPT plan before pushing:
#
#   codex exec "Review my current branch against main. Read AGENTS.md
#   and CLAUDE.md for project conventions. Focus on correctness,
#   engine/React split violations, and perf hot-path rules. Skip
#   stylistic nitpicks."
#
# The Codex CLI uses your ChatGPT plan when signed in via `codex login`,
# avoiding per-token API charges. CI auto-review with plan auth is not
# currently supported (the official codex-action requires an API key).
