name: PR Review & Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    # Only attempt on the initial open. Best-effort: don't fail the job if
    # Copilot code review isn't enabled for the repo or the reviewer slug
    # isn't a collaborator. To enable: Repo Settings → Code & automation →
    # Copilot → enable "Code review", then this request will succeed.
    if: github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['copilot-pull-request-reviewer'],
              });
              core.info('Copilot review requested.');
            } catch (err) {
              core.warning(
                `Could not request Copilot review (status ${err.status}): ${err.message}. ` +
                `This is usually because Copilot code review isn't enabled for this repo. ` +
                `Skipping — not failing the workflow.`
              );
            }

  auto-merge:
    name: Enable Auto-merge
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              auto_merge: { merge_method: 'squash' },
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Approve and merge via CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto \
            --squash
